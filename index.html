<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stand Generator AI</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- MODAL API BYOK -->
  <div class="modal-overlay" id="apiModalOverlay">
    <div class="modal-content">
      <button class="modal-close" onclick="document.getElementById('apiModalOverlay').classList.remove('visible')">&times;</button>
      <div class="modal-title">&#9881;&#65039; Provedor de IA (BYOK)</div>
      <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px;">
        <div>
          <label style="display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px;">Provedor</label>
          <select id="apiProvider" style="width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 0.9rem; outline:none;">
            <option value="gemini">Google Gemini</option>
            <option value="groq">Groq (Llama/Mixtral)</option>
            <option value="openai">OpenAI (ChatGPT)</option>
            <option value="xai">xAI (Grok)</option>
          </select>
        </div>
        <div>
          <label style="display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px;">Modelo</label>
          <select id="apiModel" style="width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 0.9rem; outline:none;"></select>
        </div>
        <div>
          <label style="display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px;">API Key <span style="font-size: 0.65rem; color: var(--accent-light);">(Salva no navegador)</span></label>
          <input type="password" id="apiKey" placeholder="Cole sua chave aqui..." style="width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 0.9rem; outline:none;">
        </div>
      </div>
      <button class="btn" style="width: 100%; padding: 10px; font-size: 0.85rem;"
        onclick="document.getElementById('apiModalOverlay').classList.remove('visible')">Salvar &amp; Fechar</button>
    </div>
  </div>

  <!-- BARRA LATERAL -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">&#128065;&#65039; Stand AI</div>
      <div class="logo-sub">Gerador inteligente de Stands</div>
    </div>

    <div style="display:flex; gap:6px; margin-bottom:8px;">
      <button class="btn btn-secondary" style="flex:1; font-size:0.75rem; padding:7px;" onclick="document.getElementById('historyPanel').classList.toggle('open')">&#128221; Hist&#243;rico</button>
      <button class="btn btn-danger" id="btnClearHistory" style="flex:1; font-size:0.75rem; padding:7px;">&#128465; Limpar</button>
    </div>

    <button class="btn btn-secondary" style="width:100%; margin-bottom:12px; font-size:0.8rem;"
      onclick="document.getElementById('apiModalOverlay').classList.add('visible')">&#9881;&#65039; Configurar API Key</button>

    <div class="form-group">
      <label>Tipo de Manifesta&#231;&#227;o</label>
      <select id="tipoManifestacao">
        <option value="aleatorio">&#127922; Aleat&#243;rio</option>
        <option value="Human&#243;ide">&#129489; Human&#243;ide</option>
        <option value="Distante">&#127754; Distante</option>
        <option value="Autom&#225;tico">&#129302; Autom&#225;tico</option>
        <option value="Col&#244;nia">&#127028; Col&#244;nia</option>
        <option value="Vinculado">&#9939;&#65039; Vinculado</option>
        <option value="Ato">&#127917; Ato (Multiforme)</option>
      </select>
    </div>

    <div class="form-group">
      <label>Poder Destrutivo</label>
      <select id="poderDestrutivo">
        <option value="aleatorio">&#127922; Aleat&#243;rio</option>
        <option value="A">A &#8212; Devastador</option>
        <option value="B">B &#8212; Grande</option>
        <option value="C">C &#8212; M&#233;dio</option>
        <option value="D">D &#8212; Baixo</option>
        <option value="E">E &#8212; M&#237;nimo</option>
      </select>
    </div>

    <button class="btn" id="btnGerar" onclick="gerarStand()">&#11088; Gerar Stand</button>
  </aside>

  <!-- PAINEL HISTORICO -->
  <div class="history-panel" id="historyPanel">
    <div id="historyChips"></div>
  </div>

  <!-- CONTEUDO PRINCIPAL -->
  <main class="main-content">

    <div class="loading" id="loading">Manifestando Stand...</div>
    <div class="error-box" id="errorBox"></div>

    <div class="card" id="card">
      <div class="card-header">
        <div>
          <div class="card-number" id="cardNumero">#001</div>
          <div class="card-name" id="cardNome">Carregando</div>
          <div class="card-tema" id="cardTema">Tema Desconhecido</div>
          <div class="card-tipos" id="cardTipos"></div>
        </div>
      </div>

      <div class="card-section">
        <div class="section-title">Habilidade Principal</div>
        <div class="card-text" id="cardHabilidade"></div>
      </div>

      <div class="card-section">
        <div class="section-title">Descri&#231;&#227;o</div>
        <div class="card-text" id="cardDescricao"></div>
      </div>

      <!-- LINHA DE ATOS -->
      <div class="card-section" id="atoLineSection" style="display:none;">
        <div class="section-title">Linha de Atos</div>
        <div class="ato-line" id="atoLine"></div>
      </div>

      <div class="card-section">
        <div class="section-title">Fraquezas &amp; Limita&#231;&#245;es</div>
        <div class="card-text" id="cardFraquezas"></div>
      </div>

      <div class="card-section">
        <div class="section-title">T&#233;cnicas</div>
        <div id="tecnicasList"></div>
      </div>

      <!-- BOTOES DE ACAO -->
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:4px;">
        <button class="btn btn-secondary copy-btn" onclick="copiarStand()">&#128203; Copiar texto</button>
        <button class="btn btn-requiem" id="btnRequiem" style="display:none;" onclick="gerarRequiem()">&#9760;&#65039; Transformar em R&#233;quiem</button>
      </div>

      <div class="card-section" id="promptContainer"></div>

      <div class="card-section">
        <div class="section-title">Estat&#237;sticas</div>
        <div class="stats-grid" id="statsGrid"></div>
      </div>

      <div class="card-section">
        <div class="section-title">Detalhes do Stand</div>
        <div class="detalhes-row" id="detalhesRow"></div>
      </div>

      <div class="card-section">
        <div class="section-title">Usu&#225;rio</div>
        <div id="usuarioBox"></div>
      </div>

      <div class="card-section">
        <div class="section-title">Refer&#234;ncias Musicais</div>
        <div id="refMusicais"></div>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
